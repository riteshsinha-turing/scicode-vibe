  &lt;style&gt;
    :root {
      --bg: #120f0b;
      --bg-soft: #1b1610;
      --panel: rgba(28, 22, 14, 0.86);
      --panel-strong: rgba(21, 17, 11, 0.96);
      --paper: #f6efdf;
      --paper-soft: #eadfca;
      --ink: #231b12;
      --muted: #a9997f;
      --gold: #cba24a;
      --gold-soft: #e9c97f;
      --gold-pale: rgba(233, 201, 127, 0.14);
      --line: rgba(233, 201, 127, 0.18);
      --success: #9ed8a7;
      --warn: #f5c36d;
      --danger: #f19a84;
      --shadow: 0 26px 70px rgba(0, 0, 0, 0.28);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --max: 1200px;
    }

    * { box-sizing: border-box; }
    html { scroll-behavior: smooth; }
    
    body {
      margin: 0;
      font-family: 'Manrope', system-ui, sans-serif;
      color: var(--paper);
      background:
        radial-gradient(circle at top left, rgba(203, 162, 74, 0.14), transparent 28%),
        radial-gradient(circle at 85% 12%, rgba(233, 201, 127, 0.1), transparent 24%),
        linear-gradient(180deg, #0f0c09 0%, #17120d 35%, #0f0c09 100%);
      min-height: 100vh;
    }
    
    a {
      color: var(--gold-soft);
      text-decoration: none;
    }
    a:hover { color: #ffe6a8; }
    
    .shell {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
    }
    
    .topbar {
      position: sticky;
      top: 0;
      z-index: 30;
      backdrop-filter: blur(16px);
      background: rgba(12, 10, 7, 0.72);
      border-bottom: 1px solid rgba(233, 201, 127, 0.08);
    }
    
    .topbar-inner {
      width: min(var(--max), calc(100% - 28px));
      margin: 0 auto;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 14px 0;
    }
    
    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      font-weight: 800;
      letter-spacing: 0.04em;
      text-transform: uppercase;
      font-size: 0.84rem;
    }
    
    .brand-badge {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--gold) 0%, #7f5d22 100%);
      color: #140f08;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.4rem;
      font-weight: 700;
      box-shadow: 0 12px 30px rgba(203, 162, 74, 0.35);
    }
    
    .mini-nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .mini-nav a {
      border: 1px solid var(--line);
      background: rgba(255,255,255,0.02);
      color: var(--paper-soft);
      padding: 9px 12px;
      border-radius: 999px;
      font-size: 0.84rem;
      font-weight: 600;
    }
    .mini-nav a:hover {
      background: var(--gold-pale);
      border-color: rgba(233, 201, 127, 0.4);
    }
    
    .hero {
      padding: 68px 0 34px;
      position: relative;
      overflow: hidden;
    }
    .hero-grid {
      display: grid;
      grid-template-columns: 1.3fr 0.85fr;
      gap: 22px;
      align-items: stretch;
    }
    .hero-card,
    .hero-side {
      background: linear-gradient(180deg, rgba(34, 27, 18, 0.95) 0%, rgba(20, 16, 10, 0.94) 100%);
      border: 1px solid rgba(233, 201, 127, 0.12);
      border-radius: var(--radius-xl);
      box-shadow: var(--shadow);
    }
    .hero-card {
      padding: 38px;
      position: relative;
      overflow: hidden;
    }
    .hero-card::after {
      content: '';
      position: absolute;
      right: -80px;
      top: -80px;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(233, 201, 127, 0.18) 0%, transparent 68%);
      pointer-events: none;
    }
    
    .eyebrow {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.14em;
      color: var(--gold-soft);
      margin-bottom: 18px;
    }
    
    h1 {
      margin: 0 0 18px;
      font-family: 'Cormorant Garamond', serif;
      font-weight: 700;
      font-size: clamp(2.7rem, 6vw, 5rem);
      line-height: 0.96;
      letter-spacing: -0.03em;
      color: #fff6df;
    }
    .hero-lead {
      margin: 0;
      max-width: 640px;
      font-size: 1.07rem;
      line-height: 1.8;
      color: #dbcdb6;
    }
    .hero-actions {
      margin-top: 24px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
    }
    .button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 13px 18px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 0.92rem;
      border: 1px solid rgba(233, 201, 127, 0.22);
      background: rgba(255,255,255,0.03);
      color: var(--paper);
      cursor: pointer;
    }
    .button.primary {
      background: linear-gradient(135deg, var(--gold) 0%, #9a742c 100%);
      color: #17110a;
      border-color: transparent;
    }
    .button:hover { transform: translateY(-1px); }
    
    .hero-side {
      padding: 26px;
      display: grid;
      gap: 14px;
      align-content: start;
    }
    .stat-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(233, 201, 127, 0.1);
      border-radius: var(--radius-md);
      padding: 16px 18px;
    }
    .stat-label {
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .stat-value {
      font-size: 1.05rem;
      font-weight: 700;
      color: #fff2d2;
    }
    .stat-meta {
      margin-top: 8px;
      font-size: 0.9rem;
      color: #d5c7af;
      line-height: 1.6;
    }
    
    main { padding: 8px 0 60px; }
    
    section {
      margin-bottom: 22px;
      background: var(--panel);
      border: 1px solid rgba(233, 201, 127, 0.1);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
      overflow: hidden;
    }
    
    .section-head {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 22px 24px 0;
    }
    .section-kicker {
      font-family: 'JetBrains Mono', monospace;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold-soft);
      font-size: 0.74rem;
    }
    h2 {
      margin: 6px 0 0;
      font-family: 'Cormorant Garamond', serif;
      font-size: clamp(2rem, 3vw, 2.8rem);
      line-height: 1;
      color: #fff4d9;
    }
    .section-note {
      padding: 10px 24px 0;
      margin: 0;
      color: #d4c7b2;
      line-height: 1.8;
      max-width: 900px;
    }
    .section-body { padding: 24px; }
    
    .alert {
      display: grid;
      grid-template-columns: auto 1fr;
      gap: 14px;
      padding: 20px;
      border-radius: var(--radius-md);
      border: 1px solid rgba(233, 201, 127, 0.16);
      background: linear-gradient(135deg, rgba(233, 201, 127, 0.12), rgba(233, 201, 127, 0.04));
    }
    .alert strong {
      display: block;
      margin-bottom: 6px;
      color: #fff1c8;
      font-size: 1rem;
    }
    .alert-icon {
      width: 44px;
      height: 44px;
      border-radius: 14px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: rgba(233, 201, 127, 0.16);
      color: var(--gold-soft);
      font-size: 1.2rem;
      font-weight: 800;
    }
    
    .grid-2, .grid-3, .grid-4 {
      display: grid;
      gap: 16px;
    }
    .grid-2 { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    .grid-3 { grid-template-columns: repeat(3, minmax(0, 1fr)); }
    .grid-4 { grid-template-columns: repeat(4, minmax(0, 1fr)); }
    
    .panel-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(233, 201, 127, 0.1);
      border-radius: var(--radius-md);
      padding: 18px;
      position: relative;
      overflow: hidden;
    }
    .panel-card::before {
      content: '';
      position: absolute;
      inset: 0 auto auto 0;
      width: 100%;
      height: 2px;
      background: linear-gradient(90deg, var(--gold) 0%, transparent 100%);
      opacity: 0.55;
    }
    .panel-title {
      margin: 0 0 8px;
      font-size: 1.02rem;
      font-weight: 800;
      color: #fff1cf;
    }
    .panel-meta {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.78rem;
      color: var(--gold-soft);
      margin-bottom: 12px;
    }
    .panel-card p {
      margin: 0;
      line-height: 1.75;
      color: #d6c9b4;
      font-size: 0.94rem;
    }
    .link-row {
      margin-top: 14px;
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    .chip-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 9px 12px;
      border-radius: 999px;
      border: 1px solid rgba(233, 201, 127, 0.16);
      background: rgba(255,255,255,0.03);
      color: #f4dfaa;
      font-size: 0.88rem;
      font-weight: 700;
    }
    
    .resource-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .resource-card {
      padding: 18px;
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.02) 100%);
      border: 1px solid rgba(233, 201, 127, 0.12);
      min-height: 100%;
    }
    .resource-tag {
      display: inline-flex;
      margin-bottom: 10px;
      padding: 6px 10px;
      border-radius: 999px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.74rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #17110a;
      background: linear-gradient(135deg, var(--gold-soft), #c89239);
    }
    .resource-card h3 {
      margin: 0 0 8px;
      color: #fff1d0;
      font-size: 1.08rem;
    }
    .resource-card p {
      margin: 0;
      color: #d7c9b3;
      line-height: 1.75;
      font-size: 0.94rem;
    }
    
    .project-grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 16px;
    }
    .project-box {
      padding: 22px;
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, rgba(255,255,255,0.05) 0%, rgba(255,255,255,0.025) 100%);
      border: 1px solid rgba(233, 201, 127, 0.12);
    }
    .project-box .mode {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.76rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: var(--gold-soft);
      margin-bottom: 12px;
    }
    .project-name {
      font-size: 1.2rem;
      font-weight: 800;
      color: #fff2d4;
      margin-bottom: 12px;
    }
    .project-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 10px;
    }
    .project-list li {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #d8cab4;
      font-size: 0.95rem;
    }
    .project-list code, .mono {
      font-family: 'JetBrains Mono', monospace;
      font-size: 0.86em;
      padding: 3px 7px;
      border-radius: 8px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(233, 201, 127, 0.1);
      color: #fff3d1;
    }
    
    .timeline {
      display: grid;
      gap: 14px;
    }
    .step {
      display: grid;
      grid-template-columns: 62px 1fr;
      gap: 16px;
      align-items: start;
      padding: 18px;
      border-radius: var(--radius-md);
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(233, 201, 127, 0.1);
    }
    .step-index {
      width: 62px;
      height: 62px;
      border-radius: 18px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(180deg, rgba(203,162,74,0.28), rgba(203,162,74,0.08));
      color: #fff0c8;
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.8rem;
      font-weight: 700;
    }
    .step h3 {
      margin: 0 0 8px;
      color: #fff0ca;
      font-size: 1.08rem;
    }
    .step p {
      margin: 0;
      color: #d7c9b4;
      line-height: 1.8;
    }

  &lt;div class=&quot;shell footer&quot;&gt;
    SciCode contributor onboarding hub with updated project links, setup resources, evaluation workflow, and QC guidance.
  &lt;/div&gt;

  &lt;script&gt;
    const button = document.getElementById('expandAll');
    const detailsEls = Array.from(document.querySelectorAll('details'));
    let expanded = false;
    
    button.addEventListener('click', () =&gt; {
      expanded = !expanded;
      detailsEls.forEach(el =&gt; {
        if (expanded) {
          el.setAttribute('open', '');
        } else {
          el.removeAttribute('open');
        }
      });
      button.textContent = expanded ? 'Collapse All Accordions' : 'Expand All Accordions';
    });

    // Enhanced smooth scroll to safely handle local cross-linking jumps
    document.querySelectorAll('a[href^=&quot;#&quot;]').forEach(link =&gt; {
      link.addEventListener('click', function(e) {
        e.preventDefault();
        const target = document.querySelector(this.getAttribute('href'));
        if (target) {
          target.scrollIntoView({
            behavior: 'smooth',
            block: 'start'
          });
        }
      });
    });

    // --- POD LEAD DIRECTORY LIVE-FETCH SYSTEM ---
    const sheetCsvUrl = &quot;https://docs.google.com/spreadsheets/d/1XP3oIVoOdc1cHXCI2bPw-Wd5yEDtdcfS_gdPf_gmiW8/export?format=csv&amp;gid=1143229322&quot;;
    
    // Domain Fallback Contact Rules Configuration
    const fallbackLeads = {
      chemistry: &quot;pulkit.s1@turing.com&quot;,
      bio: &quot;pulkit.s1@turing.com&quot;,
      physics: &quot;mecit.y@turing.com&quot;,
      material_science: &quot;laxman.g@turing.com&quot;,
      math: &quot;jorge.r@turing.com, yuvraj.y@turing.com&quot;
    };

    let directoryRecords = [];

    // Custom CSV parser to safely handle embedded commas and quote structures 
    function parseDirectoryCSV(text) {
      const lines = text.split(/\r?\n/);
      return lines.map(line =&gt; {
        const result = [];
        let cell = '';
        let insideQuote = false;
        for (let i = 0; i &lt; line.length; i++) {
          let char = line[i];
          if (char === '&quot;') {
            insideQuote = !insideQuote;
          } else if (char === ',' &amp;&amp; !insideQuote) {
            result.push(cell.trim());
            cell = '';
          } else {
            cell += char;
          }
        }
        result.push(cell.trim());
        return result;
      });
    }

    // Dynamic initial loading function
    async function loadDirectoryData() {
      try {
        const response = await fetch(sheetCsvUrl);
        if (!response.ok) throw new Error(&quot;Network restriction on sheet view permissions.&quot;);
        const csvText = await response.text();
        const parsedRows = parseDirectoryCSV(csvText);
        
        // Skip header row and extract column elements mapping criteria
        directoryRecords = parsedRows.slice(1).map(row =&gt; ({
          email: row[0] ? row[0].toLowerCase() : '',
          domain: row[1] || 'N/A',
          podLead: row[4] || 'N/A',
          superLead: row[5] || 'N/A'
        })).filter(rec =&gt; rec.email);
      } catch (err) {
        console.warn(&quot;Directory live sync blocked or restricted. Standing by for interactive fallbacks.&quot;);
      }
    }

    // Handle lookup trigger functionality 
    function handlePodLookup() {
      const emailInput = document.getElementById('trainerEmailInput').value.trim().toLowerCase();
      const outputContainer = document.getElementById('lookupResultBox');
      
      if (!emailInput) {
        outputContainer.innerHTML = `&lt;span style=&quot;color: var(--danger); font-size: 0.92rem;&quot;&gt;Please enter a valid email address first.&lt;/span&gt;`;
        outputContainer.style.display = 'block';
        return;
      }

      // Check directory array registry
      const recordMatch = directoryRecords.find(r =&gt; r.email === emailInput);

      if (recordMatch) {
        outputContainer.innerHTML = `
          &lt;div style=&quot;border-left: 3px solid var(--success); padding-left: 12px; margin: 4px 0;&quot;&gt;
            &lt;p style=&quot;margin: 0 0 8px 0; color: var(--success); font-weight: 700;&quot;&gt;Record Found&lt;/p&gt;
            &lt;p style=&quot;margin: 4px 0; font-size: 0.94rem;&quot;&gt;&lt;strong style=&quot;color: #fff;&quot;&gt;Domain Track:&lt;/strong&gt; ${recordMatch.domain}&lt;/p&gt;
            &lt;p style=&quot;margin: 4px 0; font-size: 0.94rem;&quot;&gt;&lt;strong style=&quot;color: #fff;&quot;&gt;POD Lead:&lt;/strong&gt; ${recordMatch.podLead}&lt;/p&gt;
            &lt;p style=&quot;margin: 4px 0; font-size: 0.94rem;&quot;&gt;&lt;strong style=&quot;color: #fff;&quot;&gt;Super Lead:&lt;/strong&gt; ${recordMatch.superLead}&lt;/p&gt;
          &lt;/div&gt;
        `;
      } else {
        // Fallback Questionnaire handling sequence
        outputContainer.innerHTML = `
          &lt;div style=&quot;border-left: 3px solid var(--warn); padding-left: 12px; margin: 4px 0;&quot;&gt;
            &lt;p style=&quot;margin: 0 0 4px 0; color: var(--warn); font-weight: 700;&quot;&gt;Assigning soon&lt;/p&gt;
            &lt;p style=&quot;margin: 0 0 12px 0; font-size: 0.92rem; color: #a9997f;&quot;&gt;What's your domain track?&lt;/p&gt;
            &lt;select id=&quot;fallbackDomainSelect&quot; class=&quot;select-dropdown&quot;&gt;
              &lt;option value=&quot;&quot; disabled selected&gt;-- Select your track segment --&lt;/option&gt;
              &lt;option value=&quot;chemistry&quot;&gt;Chemistry&lt;/option&gt;
              &lt;option value=&quot;bio&quot;&gt;Biology&lt;/option&gt;
              &lt;option value=&quot;physics&quot;&gt;Physics&lt;/option&gt;
              &lt;option value=&quot;material_science&quot;&gt;Material Science&lt;/option&gt;
              &lt;option value=&quot;math&quot;&gt;Mathematics&lt;/option&gt;
            &lt;/select&gt;
            &lt;div id=&quot;fallbackContactDisplay&quot; style=&quot;margin-top: 14px; font-size: 0.94rem; display: none; line-height: 1.6;&quot;&gt;&lt;/div&gt;
          &lt;/div&gt;
        `;

        document.getElementById('fallbackDomainSelect').addEventListener('change', function() {
          const selectedValue = this.value;
          const displayDiv = document.getElementById('fallbackContactDisplay');
          const leadContact = fallbackLeads[selectedValue];
          
          displayDiv.innerHTML = `As per domain: contact team lead meanwhile, thank you.&lt;br&gt;&lt;strong style=&quot;color: var(--gold-soft);&quot;&gt;Escalation Target:&lt;/strong&gt; &lt;span class=&quot;mono&quot;&gt;${leadContact}&lt;/span&gt;`;
          displayDiv.style.display = 'block';
        });
      }
      outputContainer.style.display = 'block';
    }

    // Attach event operational bindings
    document.getElementById('lookupPodBtn').addEventListener('click', handlePodLookup);
    document.getElementById('trainerEmailInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') handlePodLookup();
    });

    // Run dynamic background sheet synchronization query on load
    loadDirectoryData();
